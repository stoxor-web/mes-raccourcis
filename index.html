<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUCAS - Raccourcis web</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="container">
    <header class="topbar glass">
      <div class="topbar-left">
        <div>
          <h1>Mes raccourcis</h1>
          <p class="subtitle" id="subtitleText">
            Connecte-toi avec Google pour retrouver tes raccourcis partout.
          </p>
        </div>
      </div>

      <div class="topbar-center">
        <input
          id="searchInput"
          class="input search-large"
          type="search"
          placeholder="Rechercher un site, une section, une description..."
        />
      </div>

      <div class="topbar-right">
        <div id="userInfo" class="user-info hidden">
          <img id="userAvatar" class="avatar" alt="Avatar utilisateur" />
          <div class="user-meta">
            <div id="userName" class="user-name"></div>
            <div id="userEmail" class="user-email"></div>
          </div>
        </div>

        <div class="auth-actions">
          <button class="btn primary" id="loginBtn" type="button">Connexion Google</button>
          <button class="btn secondary hidden" id="logoutBtn" type="button">Déconnexion</button>
        </div>
      </div>
    </header>

    <section class="quickbar glass">
      <div class="quickbar-left">
        <button class="btn primary" id="addShortcutBtn" type="button">+ Raccourci</button>
        <button class="btn secondary" id="addCategoryBtn" type="button">+ Section</button>
      </div>

      <div class="quickbar-right">
        <select id="categoryFilter">
          <option value="all">Toutes les sections</option>
        </select>
        <button class="btn secondary" id="clearFiltersBtn" type="button">Réinitialiser</button>
        <button class="btn secondary" id="resetDemoBtn" type="button">Exemple</button>
        <button class="btn success" id="exportBtn" type="button">Exporter</button>
        <label class="btn secondary import-label" for="importInput">Importer</label>
        <input id="importInput" type="file" accept="application/json" hidden />
      </div>
    </section>

    <section class="statusbar">
      <div class="status-pill">
        <span class="status-value" id="shortcutCount">0</span>
        <span class="status-label">Raccourcis</span>
      </div>
      <div class="status-pill">
        <span class="status-value" id="categoryCount">0</span>
        <span class="status-label">Sections</span>
      </div>
      <div class="status-pill">
        <span class="status-value" id="visibleCount">0</span>
        <span class="status-label">Affichés</span>
      </div>
      <div class="sync-note" id="syncStatus">Mode local de démonstration</div>
    </section>

    <main id="sectionsContainer" class="section-grid"></main>
  </div>

  <dialog id="shortcutDialog">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="shortcutDialogTitle">Ajouter un raccourci</h2>
        <button class="btn secondary" id="closeShortcutDialog" type="button">Fermer</button>
      </div>

      <form id="shortcutForm">
        <input type="hidden" id="shortcutId" />

        <div class="form-grid">
          <div class="field">
            <label for="siteName">Nom du site</label>
            <input id="siteName" class="input" required placeholder="Ex : Gmail" />
          </div>

          <div class="field">
            <label for="siteUrl">URL</label>
            <input id="siteUrl" class="input" required placeholder="https://mail.google.com" />
          </div>

          <div class="field">
            <label for="siteCategory">Section / sous-section</label>
            <select id="siteCategory" required></select>
          </div>

          <div class="field full">
            <label for="siteDescription">Description</label>
            <textarea id="siteDescription" placeholder="Ex : Messagerie perso et pro"></textarea>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn secondary" id="cancelShortcutBtn">Annuler</button>
          <button type="submit" class="btn primary">Enregistrer</button>
        </div>
      </form>
    </div>
  </dialog>

  <dialog id="categoryDialog">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="categoryDialogTitle">Ajouter une section</h2>
        <button class="btn secondary" id="closeCategoryDialog" type="button">Fermer</button>
      </div>

      <form id="categoryForm">
        <input type="hidden" id="categoryEditId" />

        <div class="form-grid">
          <div class="field">
            <label for="categoryName">Nom de la section</label>
            <input id="categoryName" class="input" required placeholder="Ex : Travail" />
          </div>

          <div class="field">
            <label for="categoryColor">Couleur</label>
            <input id="categoryColor" class="input" type="color" value="#7dd3fc" />
          </div>

          <div class="field full">
            <label for="categoryParent">Section parente</label>
            <select id="categoryParent">
              <option value="">Aucune (section principale)</option>
            </select>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn secondary" id="cancelCategoryBtn">Annuler</button>
          <button type="submit" class="btn primary">Enregistrer</button>
        </div>
      </form>
    </div>
  </dialog>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
